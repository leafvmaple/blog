name: CI

# Runs on every pull request targeting main: lint + tsc + vite build.
# Doesn't snapshot issues (no GITHUB_TOKEN needed, no /data dependency in
# vite build), and doesn't deploy. Deploy lives in deploy.yml on push to main.

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
